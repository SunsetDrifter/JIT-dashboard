# Local HTTP-only front (no TLS) — single origin on :80, routing /api + /oauth2
# to the combined netbird-server and everything else to the dashboard. Mirrors
# the installer's nginx routing, minus TLS and the gRPC location (agent-only;
# not needed to test the JIT backend + dashboard REST/OIDC flows).
upstream netbird_dashboard {
    server netbird-dashboard:80;
    keepalive 10;
}
upstream netbird_server {
    server netbird-server:80;
}

server {
    listen 80;
    server_name _;

    client_header_timeout 1d;
    client_body_timeout 1d;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Scheme $scheme;
    proxy_set_header X-Forwarded-Proto http;
    proxy_set_header X-Forwarded-Host $host;

    # WebSocket (relay)
    location ~ ^/(relay|ws-proxy/) {
        proxy_pass http://netbird_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 1d;
    }

    # REST API + embedded IdP (OAuth2 / OIDC discovery / JWKS)
    location ~ ^/(api|oauth2)/ {
        proxy_pass http://netbird_server;
        proxy_set_header Host $host;
    }

    # Dashboard (catch-all)
    location / {
        proxy_pass http://netbird_dashboard;
    }
}
