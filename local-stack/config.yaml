server:
  listenAddress: ":80"
  # Advertised to PEERS for signal/relay/STUN (config.go derives Signal URI +
  # relay address from this). Must be reachable from peer containers, so use the
  # compose service name, not localhost. The browser/dashboard reach the API via
  # nginx on the host (:80) and the OIDC issuer below — both independent of this.
  exposedAddress: "http://netbird-server:80"
  stunPorts:
    - 3478
  metricsPort: 9090
  healthcheckAddress: ":9000"
  logLevel: "info"
  logFile: "console"

  authSecret: "9pM4PbV24WHHa5j1Ss2pLWlyjSaelMD7UmiWt7sOBoA"
  dataDir: "/var/lib/netbird"

  auth:
    issuer: "http://localhost/oauth2"
    # Must be true: the embedded Dex generates/publishes its signing key via this
    # rotation mechanism (false → no key at /oauth2/keys → Dex can't sign).
    signKeyRefreshEnabled: true
    dashboardRedirectURIs:
      - "http://localhost/nb-auth"
      - "http://localhost/nb-silent-auth"
    cliRedirectURIs:
      - "http://localhost:53000/"

  reverseProxy:
    trustedHTTPProxies:
      - "172.31.0.0/16"

  store:
    engine: "sqlite"
    encryptionKey: "s0OBkUbkZHsr/dWVOEHQ/5Ygcny8MZXU5052+UwaFCY="
