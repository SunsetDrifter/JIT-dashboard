# Same-origin front proxy: serves the dashboard at / and the JIT backend at
# /jit-api/, so the browser stays within CSP `connect-src 'self'` — no CSP or
# CORS changes, and no edit to the dashboard's own nginx config.
server {
  listen 80;
  server_name _;

  location /jit-api/ {
    proxy_pass http://jit-service:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://dashboard:80/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
